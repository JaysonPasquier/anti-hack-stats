<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(186,93,11);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgb(216,123,41);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,163,81);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="80" cy="80" r="50"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)" rx="15"/>

  <!-- Main Card -->
  <rect x="20" y="20" width="560" height="360" fill="#ffffff" fill-opacity="0.95" rx="15" filter="url(#shadow)"/>

  <!-- Header with Avatar (from GitHub) -->
  <circle cx="80" cy="80" r="55" fill="url(#bg)" opacity="0.3"/>
  <image href="https://raw.githubusercontent.com/JaysonPasquier/anti-hack-stats/main/bot-avatar.png" x="30" y="30" width="100" height="100" clip-path="url(#avatarClip)"/>

  <!-- Bot Name -->
  <text x="150" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="rgb(186,93,11)">
    Fugu-Security
  </text>
  <text x="150" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#666">
    Statistiques
  </text>

  <!-- Stats Grid -->
  <!-- Semaine -->
  <rect x="40" y="140" width="160" height="100" fill="rgb(216,123,41)" fill-opacity="0.08" rx="10"/>
  <text x="60" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgb(216,123,41)">
    SEMAINE
  </text>
  <text x="60" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="rgb(186,93,11)">
    10
  </text>
  <text x="60" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666">
    messages supprimés
  </text>

  <!-- Mois -->
  <rect x="220" y="140" width="160" height="100" fill="rgb(216,123,41)" fill-opacity="0.08" rx="10"/>
  <text x="240" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgb(216,123,41)">
    MOIS
  </text>
  <text x="240" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="rgb(186,93,11)">
    35
  </text>
  <text x="240" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666">
    messages supprimés
  </text>

  <!-- Année -->
  <rect x="400" y="140" width="160" height="100" fill="rgb(216,123,41)" fill-opacity="0.08" rx="10"/>
  <text x="420" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgb(216,123,41)">
    ANNÉE
  </text>
  <text x="420" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="rgb(186,93,11)">
    35
  </text>
  <text x="420" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666">
    messages supprimés
  </text>

  <!-- Total Bar -->
  <rect x="40" y="260" width="520" height="80" fill="rgb(216,123,41)" fill-opacity="0.12" rx="10"/>
  <text x="60" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgb(216,123,41)">
    TOTAL
  </text>
  <text x="60" y="315" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="rgb(186,93,11)">
    35 messages supprimés
  </text>

  <!-- Footer -->
  <text x="300" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">
    Dernière mise à jour: 24/02/2026 13:00
  </text>
</svg>